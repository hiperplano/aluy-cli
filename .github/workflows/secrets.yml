# secrets — varredura de segredos com gitleaks. Gate bloqueante: qualquer
# segredo encontrado deixa a CI vermelha. Crítico num repo público — o binário
# `aluy` distribuído tem de nascer limpo (sem credencial/token versionado).
# Config em `.gitleaks.toml`.

name: secrets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
