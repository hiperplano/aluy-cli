# secrets — varredura de segredos com gitleaks. Gate bloqueante: qualquer
# segredo encontrado deixa a CI vermelha. Crítico num repo público — o binário
# `aluy` distribuído tem de nascer limpo (sem credencial/token versionado).
# Config em `.gitleaks.toml`.
#
# F-CI (2026-07-02) — roda o CLI PINADO do gitleaks, não a gitleaks-action: a
# action exige licença p/ repositórios de organização (GITLEAKS_LICENSE) e o job
# ficava VERMELHO em TODA branch (incl. main) por falta dela — known-red que
# viola a CI honesta. O CLI é o MESMO scanner, sem licença, e ganha o pin de
# supply-chain do padrão central do Aluy (aluy-infra/secrets-scan.yml): binário
# da release + SHA256 verificado ANTES de executar (re-apontar a tag upstream
# não muda o binário — o checksum reprovaria). Atualizar a versão exige trocar
# versão+checksum aqui (revisável).

name: secrets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.30.1'
      # SHA256 do tarball linux_x64 da release v8.30.1 (pin de supply-chain —
      # mesmo par versão/checksum do secrets-scan.yml central do aluy-infra).
      GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
    steps:
      # Histórico completo: o scan cobre TODOS os commits do PR, não só o HEAD.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: instalar gitleaks ${{ env.GITLEAKS_VERSION }} (verificando SHA256)
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          curl -fsSL -o "$tarball" "$url"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gitleaks" version

      # BLOQUEANTE: gitleaks sai != 0 ao achar segredo (--exit-code 1); NÃO
      # capturamos/mascaramos esse exit. --redact: o achado nunca vaza no log.
      - name: gitleaks git (histórico) — BLOQUEANTE
        run: |
          set -euo pipefail
          gitleaks git . \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --exit-code 1
