# CI — lint, type-check, build e testes do monorepo (@aluy/cli-core → @aluy/cli).
# Sem masking: nada de `|| true` / `continue-on-error` / `--exit-zero`. Gate
# vermelho bloqueia o merge.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: instalar deps (lockfile exato)
        run: npm ci

      - name: lint
        run: npm run lint

      - name: build (tsc -b)
        run: npm run build

      - name: testes
        run: npm test -- --exclude '**/headless-exit.test.ts' --exclude '**/headless-yolo-bin.test.ts'
